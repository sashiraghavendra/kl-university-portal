spring.application.name=KL University Portal
server.port=${PORT:8080}

spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/kl_university_portal?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true
spring.jackson.serialization.fail-on-empty-beans=false

app.jwt.secret=${JWT_SECRET:KLUniversityPortalProductionStyleSecretKeyChangeMeToAtLeast256Bits}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.upload.dir=${UPLOAD_DIR:uploads}
app.frontend.origin=${FRONTEND_ORIGIN:http://localhost:8080}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=8MB

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@example.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
