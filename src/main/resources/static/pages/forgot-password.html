<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Password Recovery | KL University Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<main class="page-band">
    <div class="container">
        <div class="row justify-content-center g-4">
            <div class="col-md-6">
                <form id="forgotForm" class="glass panel p-4">
                    <h1 class="h3 mb-4">Forgot Password</h1>
                    <input class="form-control mb-3" name="username" placeholder="Register number or email" required>
                    <button class="btn btn-primary"><i class="fa-solid fa-key me-2"></i>Send OTP</button>
                </form>
            </div>
            <div class="col-md-6">
                <form id="resetForm" class="glass panel p-4">
                    <h2 class="h3 mb-4">Reset Password</h2>
                    <input class="form-control mb-3" name="username" placeholder="Register number or email" required>
                    <input class="form-control mb-3" type="password" name="newPassword" placeholder="New strong password" required>
                    <button class="btn btn-outline-primary"><i class="fa-solid fa-rotate me-2"></i>Reset Password</button>
                </form>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
