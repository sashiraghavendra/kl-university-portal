<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Student Login | KL University Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<main class="page-band">
    <div class="container">
        <a href="/" class="fw-bold d-inline-flex align-items-center gap-2 mb-4"><span class="brand-mark">KL</span> KL University Portal</a>
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-5">
                <form data-login-form class="glass panel p-4">
                    <h1 class="h3 mb-2">Student Login</h1>
                    <p class="text-muted-portal">Use your register number after admission approval.</p>
                    <input class="form-control mb-3" name="username" placeholder="Register number, e.g. KLU2026ABC123" required>
                    <input class="form-control mb-3" type="password" name="password" placeholder="Password" required>
                    <button class="btn btn-primary w-100"><i class="fa-solid fa-right-to-bracket me-2"></i>Login</button>
                    <div class="d-flex justify-content-between mt-3">
                        <a href="/pages/register.html">Apply online</a>
                        <a href="/pages/forgot-password.html">Forgot password</a>
                    </div>
                    <a class="btn btn-outline-primary w-100 mt-3" href="/pages/admin-login.html">Admin Login</a>
                </form>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
