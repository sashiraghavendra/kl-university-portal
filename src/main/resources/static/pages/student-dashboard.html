<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Student Dashboard | KL University Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body id="studentDashboard">
<div class="dashboard-shell">
    <aside class="sidebar">
        <div class="d-flex align-items-center gap-2 mb-4"><span class="brand-mark">KL</span><strong>Student Portal</strong></div>
        <nav class="nav flex-column gap-1">
            <a class="nav-link active" href="#" data-view="dashboard"><i class="fa-solid fa-table-columns"></i> Dashboard</a>
            <a class="nav-link" href="#" data-view="courses"><i class="fa-solid fa-book-open"></i> Courses</a>
            <a class="nav-link" href="#" data-view="payments"><i class="fa-solid fa-credit-card"></i> Payments</a>
            <a class="nav-link" href="#" data-view="hostel"><i class="fa-solid fa-bed"></i> Hostel</a>
            <a class="nav-link" href="#" data-view="profile"><i class="fa-solid fa-user"></i> Profile</a>
            <a class="nav-link" href="#" data-view="announcements"><i class="fa-solid fa-bullhorn"></i> Announcements</a>
            <button class="nav-link border-0 bg-transparent text-start mt-3" data-logout><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
        </nav>
    </aside>
    <main class="main-area">
        <div class="d-flex flex-wrap gap-3 justify-content-between align-items-center mb-4">
            <div>
                <h1 class="h3 mb-1" id="dashboardTitle">Student Dashboard</h1>
                <p class="text-muted-portal mb-0" id="dashboardSubtitle">Loading portal details</p>
            </div>
            <button class="btn btn-outline-primary" data-theme-toggle><i class="fa-solid fa-circle-half-stroke"></i></button>
        </div>
        <section id="dashboardContent"></section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
