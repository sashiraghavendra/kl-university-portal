<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Fee Payment</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet"><link href="/css/style.css" rel="stylesheet"></head><body><main class="page-band"><div class="container"><a href="/pages/student-dashboard.html" class="fw-bold d-inline-flex align-items-center gap-2 mb-4"><span class="brand-mark">KL</span> Student Portal</a><div class="row g-4"><div class="col-lg-5"><form id="feeForm" class="glass panel p-4"><h1 class="h3 mb-4">Fee Payment</h1><input class="form-control mb-3" name="regNo" placeholder="Register number" required><input class="form-control mb-3" type="number" name="semester" value="1" min="1" required><input class="form-control mb-3" type="number" name="amount" placeholder="Amount" min="1" required><select class="form-select mb-3" name="paymentMethod"><option>UPI</option><option>Card</option><option>Net Banking</option><option>Razorpay</option></select><button class="btn btn-primary"><i class="fa-solid fa-credit-card me-2"></i>Pay Now</button></form></div><div class="col-lg-7"><div class="glass panel p-4"><h2 class="h5">Recent Payments</h2><div class="table-responsive"><table class="table"><thead><tr><th>Transaction</th><th>Amount</th><th>Method</th><th>Date</th><th>PDF</th></tr></thead><tbody id="paymentHistory"></tbody></table></div></div></div></div></div></main><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="/js/app.js"></script></body></html>
