<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Apply | KL University Portal</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet"><link href="/css/style.css" rel="stylesheet"></head><body>
<main class="page-band"><div class="container"><a href="/" class="fw-bold d-inline-flex align-items-center gap-2 mb-4"><span class="brand-mark">KL</span> KL University Portal</a><div class="row g-4"><div class="col-lg-8"><form id="registerForm" class="glass panel p-4"><h1 class="h3 mb-4">Student Admission</h1><div class="row g-3"><div class="col-md-6"><input class="form-control" name="firstName" placeholder="First name" required></div><div class="col-md-6"><input class="form-control" name="lastName" placeholder="Last name" required></div><div class="col-md-4"><select class="form-select" name="gender"><option>Male</option><option>Female</option><option>Other</option></select></div><div class="col-md-4"><input class="form-control" type="date" name="dob"></div><div class="col-md-4"><input class="form-control" name="mobile" pattern="[0-9]{10}" placeholder="Mobile" required></div><div class="col-md-6"><input class="form-control" name="fatherName" placeholder="Father name"></div><div class="col-md-6"><input class="form-control" name="motherName" placeholder="Mother name"></div><div class="col-md-6"><input class="form-control" type="email" name="email" placeholder="Email" required></div><div class="col-md-6"><input class="form-control" type="password" name="password" placeholder="Strong password" required></div><div class="col-12"><select class="form-select" name="courseId" data-course-select="#feePreview" required></select></div><div class="col-12"><textarea class="form-control" name="address" rows="3" placeholder="Address"></textarea></div><div class="col-md-4"><input class="form-control" name="city" placeholder="City"></div><div class="col-md-4"><input class="form-control" name="state" placeholder="State"></div><div class="col-md-4"><input class="form-control" name="pincode" placeholder="Pincode"></div><div class="col-12"><button class="btn btn-primary btn-lg"><i class="fa-solid fa-paper-plane me-2"></i>Submit Application</button></div></div></form></div><div class="col-lg-4"><div class="glass panel p-4"><h2 class="h5">Fee Structure</h2><div id="feePreview" class="mt-3 text-muted-portal">Select a course to view fee breakdown.</div></div></div></div></div></main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="/js/app.js"></script></body></html>
